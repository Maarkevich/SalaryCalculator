<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <!-- viewport-fit=cover убирает белую полосу на iOS PWA -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#4facfe" media="(prefers-color-scheme: light)">
    <meta name="theme-color" content="#16213e" media="(prefers-color-scheme: dark)">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <title>Расчёт З/П</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="style.css">
    <link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 512 512'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0' y1='0' x2='1' y2='1'%3E%3Cstop offset='0%25' stop-color='%234facfe'/%3E%3Cstop offset='100%25' stop-color='%2300f2fe'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='512' height='512' fill='url(%23g)' rx='80'/%3E%3Ctext x='50%25' y='55%25' dy='.35em' text-anchor='middle' fill='white' font-family='system-ui' font-size='300' font-weight='bold'%3E₽%3C/text%3E%3C/svg%3E">
</head>
<body>
    <div class="app-container">
        <header>
            <h1>Расчёт З/П</h1>
            <button id="theme-toggle" aria-label="Переключить тему">🌙</button>
        </header>

        <main>
            <section class="card fade-in">
                <label for="role-select">1. Выберите должность</label>
                <select id="role-select"></select>
            </section>

            <section class="card fade-in delay-1">
                <label>2. Параметры расчёта</label>
                <div class="inputs">
                    <div class="input-group">
                        <label for="ktu-input">КТУ за месяц</label>
                        <input type="number" id="ktu-input" inputmode="decimal" step="any" placeholder="1.0">
                    </div>
                    <div class="input-group">
                        <label for="hours-input">Часов отработано</label>
                        <input type="number" id="hours-input" inputmode="decimal" step="any" placeholder="165">
                    </div>
                </div>
            </section>

            <section id="result-container" class="result-box fade-in delay-2">
                <div class="result-label">Итог З/П</div>
                <div id="result-value" class="result-value">—</div>
                <div class="result-currency">российских рублей</div>
            </section>

            <div class="actions fade-in delay-3">
                <button id="save-btn" class="btn primary">💾 Сохранить расчёт</button>
                <button id="history-btn" class="btn secondary">📜 История</button>
                <button id="clear-btn" class="btn tertiary">🗑 Очистить</button>
            </div>
        </main>
    </div>

    <div id="install-banner" class="banner hidden">
        <span id="install-text"></span>
        <button id="install-action" class="btn small"></button>
        <button id="install-dismiss" class="btn small dismiss" aria-label="Закрыть">✕</button>
    </div>

    <dialog id="history-dialog">
        <div class="dialog-header">
            <h2>История расчётов</h2>
            <button id="close-dialog" class="btn icon-btn" aria-label="Закрыть">✕</button>
        </div>
        <div id="history-list" class="history-list"></div>
        <div class="dialog-actions">
            <button id="clear-history-btn" class="btn danger">🗑 Очистить историю</button>
        </div>
    </dialog>

    <script src="app.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => navigator.serviceWorker.register('sw.js'));
        }
    </script>
</body>
</html>
